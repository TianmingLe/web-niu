<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦境意识流交互网页</title>
    <style>
        :root {
            --font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            --bg-color-1: #1a1a2e;
            --bg-color-2: #16213e;
            --bg-color-3: #0f3460;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            user-select: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 活跃评论容器 */
        #active-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 800px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #active-comment {
            font-size: 2rem;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease-in-out, transform 1.5s ease-in-out;
        }

        #active-comment.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #active-comment.fading {
            opacity: 0;
            transform: translateY(-20px);
        }

        /* 便签容器 */
        #notes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto;
        }

        .note {
            position: absolute;
            padding: 20px;
            border-radius: 12px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: opacity 3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: grab;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
            transform: rotate(var(--rot, 0deg));
        }

        /* 悬停效果：稍微放大，透明度变低（即更不透明） */
        .note:hover {
            transform: scale(1.1) rotate(var(--rot, 0deg)) !important; /* 保留旋转 */
            opacity: 1 !important;
            z-index: 100 !important;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .note.dragging {
            cursor: grabbing;
            transform: scale(1.1) rotate(var(--rot, 0deg)) !important;
            opacity: 1 !important;
            transition: none !important;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6) !important;
        }

        /* 便签样式 */
        .style-glass {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .style-dark {
            background: rgba(0, 0, 0, 0.4);
            color: #ddd;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .style-pink {
            background: rgba(255, 182, 193, 0.15);
            color: #ffe6ea;
            border-color: rgba(255, 182, 193, 0.3);
        }

        .style-blue {
            background: rgba(173, 216, 230, 0.15);
            color: #e0f7fa;
            border-color: rgba(173, 216, 230, 0.3);
        }
        
        .style-gold {
            background: rgba(255, 215, 0, 0.15);
            color: #fffacd;
            border-color: rgba(255, 215, 0, 0.3);
        }

        .style-neon {
            background: rgba(20, 0, 40, 0.4);
            color: #0ff;
            border: 1px solid #0ff;
            box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff;
            text-shadow: 0 0 5px #0ff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .style-paper {
            background: rgba(244, 238, 224, 0.85);
            color: #3e2723;
            border: 1px solid rgba(200, 180, 150, 0.5);
            font-family: "Georgia", serif;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.3);
            text-shadow: none;
        }

        .style-mint {
            background: rgba(152, 255, 152, 0.15);
            color: #e6ffe6;
            border-color: rgba(152, 255, 152, 0.3);
            font-style: italic;
        }

        .style-purple {
            background: rgba(216, 191, 216, 0.15);
            color: #f8f4ff;
            border-color: rgba(216, 191, 216, 0.4);
        }

        .style-holographic {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 105, 180, 0.15), rgba(135, 206, 235, 0.15));
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .style-typewriter {
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            border: 1px dashed #0f0;
            font-family: "Courier New", monospace;
        }

        .style-crimson {
            background: rgba(220, 20, 60, 0.15);
            color: #ffe6e6;
            border-color: rgba(220, 20, 60, 0.4);
        }

        .style-minimal {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 0px;
        }

        /* 滚动提示 */
        #scroll-hint {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { opacity: 0.3; }
        }

        /* 角落添加按钮 */
        #add-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            transition: all 0.3s;
        }

        #add-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        /* 模态框 */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        #modal-content {
            background: rgba(30, 30, 50, 0.8);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 400px;
            transform: translateY(20px);
            transition: transform 0.3s;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #modal-overlay.active #modal-content {
            transform: translateY(0);
        }

        #modal-content h3 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            padding: 10px;
            font-family: inherit;
            resize: none;
            margin-bottom: 15px;
            outline: none;
        }

        textarea:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }

        select option {
            background: #1a1a2e;
            color: white;
        }

        .modal-btns {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .modal-btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-submit {
            background: rgba(100, 150, 255, 0.8);
            color: white;
        }

        .btn-submit:hover {
            background: rgba(100, 150, 255, 1);
        }

    </style>
</head>
<body>

    <div id="notes-container"></div>

    <div id="active-container">
        <div id="active-comment"></div>
    </div>

    <div id="scroll-hint">向下滚动探索意识流</div>

    <div id="add-btn">+</div>

    <div id="modal-overlay">
        <div id="modal-content">
            <h3>留下你的便签</h3>
            <textarea id="note-input" placeholder="写下你的故事..."></textarea>
            <select id="note-style">
                <option value="style-glass">透明清澈 (Glass)</option>
                <option value="style-dark">深邃暗夜 (Dark)</option>
                <option value="style-pink">晚霞粉红 (Pink)</option>
                <option value="style-blue">忧郁深蓝 (Blue)</option>
                <option value="style-gold">记忆流金 (Gold)</option>
                <option value="style-neon">赛博霓虹 (Neon)</option>
                <option value="style-paper">泛黄信笺 (Paper)</option>
                <option value="style-mint">薄荷微风 (Mint)</option>
                <option value="style-purple">薰衣草紫 (Purple)</option>
                <option value="style-holographic">幻彩全息 (Holographic)</option>
                <option value="style-typewriter">复古打字机 (Typewriter)</option>
                <option value="style-crimson">猩红记忆 (Crimson)</option>
                <option value="style-minimal">极简线条 (Minimal)</option>
            </select>
            <div class="modal-btns">
                <button class="btn-cancel" id="btn-cancel">取消</button>
                <button class="btn-submit" id="btn-submit">随手丢落</button>
            </div>
        </div>
    </div>

    <script>
        let comments = [];
        let currentIndex = 0;
        let isTransitioning = false;
        let wheelAccumulator = 0;
        const WHEEL_THRESHOLD = 300; // 滚动多少距离触发下一条

        const activeCommentEl = document.getElementById('active-comment');
        const notesContainer = document.getElementById('notes-container');
        
        const styles = [
            'style-glass', 'style-dark', 'style-pink', 'style-blue', 'style-gold',
            'style-neon', 'style-paper', 'style-mint', 'style-purple', 'style-holographic',
            'style-typewriter', 'style-crimson', 'style-minimal'
        ];

        // 获取评论数据
        async function fetchComments() {
            try {
                const res = await fetch('comments.json');
                const data = await res.json();
                if (data && data.length > 0) {
                    comments = data;
                    showComment(comments[0]);
                }
            } catch (err) {
                console.error("加载评论失败", err);
                // 默认数据降级
                comments = [
                    "黑板上的粉笔灰落在阳光里 像一场无声的雪",
                    "大海是鱼儿的陆地 梦境是爱情的白天",
                    "那些没说出口的喜欢 都化作了教室窗外 迟迟不肯落下的晚霞"
                ];
                showComment(comments[0]);
            }
        }

        // 显示当前评论
        function showComment(text) {
            activeCommentEl.innerText = text;
            activeCommentEl.className = 'visible';
            isTransitioning = false;
        }

        // 丢落当前评论为便签
        function dropCurrentComment() {
            const text = activeCommentEl.innerText;
            if (!text) return;

            const note = document.createElement('div');
            note.className = 'note';
            
            // 随机样式
            const randomStyle = styles[Math.floor(Math.random() * styles.length)];
            note.classList.add(randomStyle);
            
            note.innerText = text;

            // 随机位置 (限制在屏幕内)
            const x = 10 + Math.random() * 70; // 10% to 80%
            const y = 10 + Math.random() * 70; // 10% to 80%
            const rotation = (Math.random() - 0.5) * 30; // -15deg to 15deg

            note.style.left = x + '%';
            note.style.top = y + '%';
            note.style.setProperty('--rot', `${rotation}deg`);
            
            // 初始透明度
            note.style.opacity = '1';
            
            // 层级递增，确保新便签在上面
            note.style.zIndex = Math.floor(Math.random() * 10) + 10;

            notesContainer.appendChild(note);

            // 随时间慢慢降低透明度
            setTimeout(() => {
                note.style.opacity = '0.25'; // 降低到一个程度
            }, 100);
        }

        // 触发下一条
        function nextComment() {
            if (isTransitioning || comments.length === 0) return;
            isTransitioning = true;
            
            // 1. 将当前的评论丢落
            dropCurrentComment();

            // 2. 当前中心文字淡出
            activeCommentEl.className = 'fading';

            // 3. 稍微慢点：等待淡出完成后再显示下一条
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % comments.length;
                activeCommentEl.className = ''; // reset
                activeCommentEl.innerText = comments[currentIndex];
                
                // 再延迟一点点淡入，显得从容
                setTimeout(() => {
                    activeCommentEl.className = 'visible';
                    // 保护期，防止滚动过快
                    setTimeout(() => {
                        isTransitioning = false;
                        wheelAccumulator = 0;
                    }, 1000);
                }, 200);
            }, 1500); // 与CSS transition匹配
        }

        // 监听滚轮事件，阻止默认滚动，累加数值
        window.addEventListener('wheel', (e) => {
            e.preventDefault(); // 不要滚动页面
            
            if (isTransitioning) return;
            
            // 向下滚动
            if (e.deltaY > 0) {
                wheelAccumulator += e.deltaY;
                if (wheelAccumulator > WHEEL_THRESHOLD) {
                    nextComment();
                }
            }
        }, { passive: false });

        // 触屏滑动支持
        let touchStartY = 0;
        window.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            e.preventDefault();
            if (isTransitioning) return;
            const touchEndY = e.touches[0].clientY;
            const deltaY = touchStartY - touchEndY;
            if (deltaY > 50) { // 向上滑动（相当于向下滚动）
                nextComment();
                touchStartY = touchEndY; // reset
            }
        }, { passive: false });

        // 模态框逻辑
        const addBtn = document.getElementById('add-btn');
        const modal = document.getElementById('modal-overlay');
        const btnCancel = document.getElementById('btn-cancel');
        const btnSubmit = document.getElementById('btn-submit');
        const noteInput = document.getElementById('note-input');
        const noteStyle = document.getElementById('note-style');

        addBtn.addEventListener('click', () => {
            modal.classList.add('active');
            noteInput.value = '';
            noteInput.focus();
        });

        btnCancel.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        btnSubmit.addEventListener('click', () => {
            const text = noteInput.value.trim();
            if (text) {
                // 直接创建一个新便签
                const note = document.createElement('div');
                note.className = 'note ' + noteStyle.value;
                note.innerText = text;

                const x = 10 + Math.random() * 70; 
                const y = 10 + Math.random() * 70; 
                const rotation = (Math.random() - 0.5) * 30;

                note.style.left = x + '%';
                note.style.top = y + '%';
                note.style.setProperty('--rot', `${rotation}deg`);
                note.style.opacity = '1';
                note.style.zIndex = 50; // 新加的层级稍微高一点

                notesContainer.appendChild(note);

                setTimeout(() => {
                    note.style.opacity = '0.3';
                }, 1500); // 新添加的便签保持高亮久一点再变暗

                modal.classList.remove('active');
            }
        });

        // 点击背景也可以关闭模态框
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // 拖拽逻辑
        let isDragging = false;
        let dragTarget = null;
        let startClientX = 0;
        let startClientY = 0;
        let startLeft = 0;
        let startTop = 0;
        let maxZIndex = 200; // 确保拖拽时在最上层

        function startDrag(e) {
            if (!e.target.classList.contains('note')) return;
            isDragging = true;
            dragTarget = e.target;
            
            startClientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            startClientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            
            // 获取实际计算出的像素值
            const computed = window.getComputedStyle(dragTarget);
            startLeft = parseFloat(computed.left) || 0;
            startTop = parseFloat(computed.top) || 0;
            
            dragTarget.style.left = startLeft + 'px';
            dragTarget.style.top = startTop + 'px';
            
            maxZIndex++;
            dragTarget.style.zIndex = maxZIndex;
            dragTarget.classList.add('dragging');
        }

        function onDrag(e) {
            if (!isDragging || !dragTarget) return;
            
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            
            const deltaX = clientX - startClientX;
            const deltaY = clientY - startClientY;
            
            dragTarget.style.left = (startLeft + deltaX) + 'px';
            dragTarget.style.top = (startTop + deltaY) + 'px';
        }

        function stopDrag() {
            if (!isDragging) return;
            isDragging = false;
            if (dragTarget) {
                dragTarget.classList.remove('dragging');
                dragTarget = null;
            }
        }

        document.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', stopDrag);

        document.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', (e) => {
            if (isDragging) {
                e.preventDefault(); // 拖拽便签时阻止屏幕滚动
                onDrag(e);
            }
        }, { passive: false });
        document.addEventListener('touchend', stopDrag);

        // 启动
        fetchComments();

    </script>
</body>
</html>
