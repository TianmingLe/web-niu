<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式梦境 - 意识流</title>

    <style>
        :root {
            --bg-color: #101118;
            --accent-1: #7f809a;
            --accent-2: #a895b8;
            --accent-3: #98aebb;
            --accent-4: #8fa58f;
            --panel-bg: rgba(255, 255, 255, 0.06);
            --panel-border: rgba(255, 255, 255, 0.14);
            --soft-text: rgba(244, 240, 235, 0.92);
            --muted-text: rgba(244, 240, 235, 0.52);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: "Noto Serif SC", "Songti SC", "Georgia", serif;
            color: var(--soft-text);
            user-select: none;
            -webkit-user-select: none;
        }

        * {
            box-sizing: border-box;
        }

        #root {
            width: 100%;
            height: 100%;
        }

        /* 复杂的流动背景层 */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            filter: blur(80px);
            opacity: 0.42;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            will-change: transform;
        }

        /* 顶部遮罩，用来加一些噪点质感 */
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            mix-blend-mode: overlay;
        }

        /* 主视图容器 */
        .main-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            --px: 0;
            --py: 0;
        }

        .season-stage {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        .season-stage.active {
            opacity: 1;
        }

        .season-layer {
            position: absolute;
            inset: -6%;
            will-change: transform, opacity, filter;
            transform: translate3d(0, 0, 0);
            opacity: 0;
            transition: opacity 1.4s ease, filter 1.4s ease, transform 0.5s ease;
        }

        .season-layer.is-active {
            opacity: 1;
        }

        .season-layer-far {
            transform: translate3d(calc(var(--px) * 6px), calc(var(--py) * 6px), 0);
        }

        .season-layer-mid {
            transform: translate3d(calc(var(--px) * 12px), calc(var(--py) * 12px), 0);
        }

        .season-far.spring { background: radial-gradient(860px 560px at 18% 16%, rgba(206, 168, 212, 0.30), transparent 62%), radial-gradient(1100px 700px at 20% 18%, rgba(168,149,184,0.16), transparent 62%), radial-gradient(900px 520px at 80% 35%, rgba(152,174,187,0.14), transparent 64%), linear-gradient(180deg, rgba(16,17,24,1), rgba(16,17,24,1)); }
        .season-far.summer { background: radial-gradient(860px 560px at 82% 20%, rgba(116, 140, 214, 0.30), transparent 62%), radial-gradient(900px 620px at 22% 22%, rgba(96,108,160,0.16), transparent 64%), radial-gradient(1100px 700px at 78% 36%, rgba(132,94,166,0.14), transparent 66%), linear-gradient(180deg, rgba(16,17,24,1), rgba(16,17,24,1)); }
        .season-far.autumn { background: radial-gradient(860px 560px at 22% 78%, rgba(218, 198, 146, 0.30), transparent 64%), radial-gradient(900px 620px at 24% 24%, rgba(208,195,168,0.16), transparent 64%), radial-gradient(1100px 700px at 78% 44%, rgba(200,167,167,0.14), transparent 66%), linear-gradient(180deg, rgba(16,17,24,1), rgba(16,17,24,1)); }
        .season-far.winter { background: radial-gradient(920px 620px at 52% 14%, rgba(136, 168, 188, 0.28), transparent 64%), radial-gradient(900px 620px at 22% 22%, rgba(152,174,187,0.16), transparent 64%), radial-gradient(1100px 700px at 78% 44%, rgba(127,128,154,0.12), transparent 66%), linear-gradient(180deg, rgba(16,17,24,1), rgba(16,17,24,1)); }

        .season-mid.spring { background: radial-gradient(560px 320px at 22% 18%, rgba(250,244,238,0.06), transparent 64%), radial-gradient(560px 340px at 78% 28%, rgba(206, 168, 212, 0.10), transparent 68%); filter: blur(10px); }
        .season-mid.summer { background: radial-gradient(560px 320px at 22% 26%, rgba(250,244,238,0.05), transparent 66%), radial-gradient(620px 360px at 84% 34%, rgba(116, 140, 214, 0.10), transparent 70%); filter: blur(11px); }
        .season-mid.autumn { background: radial-gradient(560px 320px at 20% 30%, rgba(250,244,238,0.05), transparent 66%), radial-gradient(640px 380px at 78% 42%, rgba(218, 198, 146, 0.10), transparent 70%); filter: blur(11px); }
        .season-mid.winter { background: radial-gradient(560px 320px at 18% 24%, rgba(250,244,238,0.05), transparent 66%), radial-gradient(660px 400px at 84% 34%, rgba(136, 168, 188, 0.10), transparent 70%); filter: blur(12px); }

        .season-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.4s ease;
        }

        .season-canvas.is-active {
            opacity: 1;
        }

        @media (prefers-reduced-motion: reduce) {
            .season-stage,
            .season-layer,
            .season-canvas {
                transition: none;
            }
        }

        /* 活跃文字区 */
        .active-text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 900px;
            text-align: center;
            pointer-events: none;
            z-index: 50;
            perspective: 1000px;
        }

        .active-text {
            font-size: 2.5rem;
            line-height: 1.8;
            text-shadow: 0 0 18px rgba(255, 245, 235, 0.18), 0 0 36px rgba(152, 174, 187, 0.14);
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0;
            will-change: transform, opacity;
        }

        /* 掉落的便签容器 */
        .notes-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 20;
        }

        /* 便签基础样式 */
        .memory-note {
            position: absolute;
            padding: 24px 32px;
            border-radius: 16px;
            max-width: 320px;
            font-size: 1.1rem;
            line-height: 1.6;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            word-wrap: break-word;
            will-change: transform, opacity, box-shadow;
            transform-origin: center center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* 初始状态由GSAP控制 */
        }

        .memory-note::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            border: 1px solid transparent;
            opacity: 0.72;
            mix-blend-mode: overlay;
        }

        .season-spring .memory-note::after {
            border-color: rgba(206, 168, 212, 0.24);
            opacity: 0.78;
        }

        .season-summer .memory-note::after {
            border-color: rgba(116, 140, 214, 0.22);
            opacity: 0.76;
        }

        .season-autumn .memory-note::after {
            border-color: rgba(218, 198, 146, 0.22);
            opacity: 0.76;
        }

        .season-winter .memory-note::after {
            border-color: rgba(136, 168, 188, 0.26);
            opacity: 0.80;
        }

        .note-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .note-tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(10, 10, 14, 0.35);
            color: var(--muted-text);
            font-size: 11px;
            letter-spacing: 0.08em;
        }

        .mode-reading .note-tag-pill {
            opacity: 0.66;
        }

        .tag-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex: 0 0 auto;
        }

        .tag-name {
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .note-body {
            white-space: pre-wrap;
        }

        .memory-note.focused {
            box-shadow: 0 18px 60px rgba(255, 245, 235, 0.16);
        }
        
        .memory-note:active {
            cursor: grabbing;
        }

        /* 便签主题：深海、幻光、极简线框、霓虹、纸本等 */
        .theme-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(248, 243, 239, 0.88);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .theme-abyss {
            background: rgba(24, 29, 42, 0.62);
            border: 1px solid rgba(152, 174, 187, 0.18);
            color: #d9e5eb;
            box-shadow: 0 10px 40px rgba(90, 110, 120, 0.08);
        }

        .theme-crimson {
            background: rgba(68, 46, 57, 0.52);
            border: 1px solid rgba(220, 192, 198, 0.18);
            color: #f3e7e9;
            box-shadow: 0 10px 40px rgba(96, 62, 74, 0.08);
        }

        .theme-holo {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(168, 149, 184, 0.12), rgba(152, 174, 187, 0.08));
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #f7f3ef;
            box-shadow: 0 10px 40px rgba(120, 110, 140, 0.12);
        }

        .theme-paper {
            background: rgba(236, 231, 222, 0.9);
            border: 1px solid rgba(195, 184, 166, 0.36);
            color: #35312d;
            text-shadow: none;
            box-shadow: 2px 8px 20px rgba(0, 0, 0, 0.4);
            font-family: "Georgia", serif;
        }

        .theme-neon {
            background: rgba(28, 35, 31, 0.62);
            border: 1px solid rgba(172, 193, 170, 0.22);
            color: #e0ebe0;
            box-shadow: 0 0 15px rgba(143, 165, 143, 0.18), inset 0 0 10px rgba(143, 165, 143, 0.08);
            text-shadow: 0 0 5px rgba(224, 235, 224, 0.18);
            font-family: "Courier New", monospace;
        }

        .theme-blush {
            background: rgba(133, 94, 112, 0.38);
            border: 1px solid rgba(244, 215, 226, 0.22);
            color: #fff4f8;
            box-shadow: 0 12px 30px rgba(97, 65, 83, 0.18);
        }

        .theme-lavender {
            background: rgba(118, 111, 153, 0.34);
            border: 1px solid rgba(224, 218, 247, 0.22);
            color: #f6f2ff;
            box-shadow: 0 12px 30px rgba(90, 84, 124, 0.16);
        }

        .theme-pearl {
            background: rgba(241, 233, 228, 0.86);
            border: 1px solid rgba(214, 200, 193, 0.4);
            color: #403734;
            box-shadow: 0 14px 34px rgba(46, 39, 38, 0.16);
        }

        .theme-sunset {
            background: rgba(171, 125, 112, 0.36);
            border: 1px solid rgba(248, 219, 204, 0.22);
            color: #fff6f0;
            box-shadow: 0 12px 32px rgba(114, 82, 74, 0.18);
        }

        .font-serif {
            font-family: "Noto Serif SC", "Songti SC", "Georgia", serif;
        }

        .font-kaiti {
            font-family: "Kaiti SC", "STKaiti", "KaiTi", serif;
        }

        .font-fangsong {
            font-family: "FangSong", "STFangsong", serif;
        }

        .font-sans {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
        }

        .font-rounded {
            font-family: "YouYuan", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        /* 控制面板/操作按钮 */
        .controls {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
            max-width: min(620px, calc(100vw - 24px));
        }

        .controls.compact {
            gap: 10px;
        }

        .controls.compact .soft-icon-btn {
            width: 46px;
            height: 46px;
            font-size: 16px;
        }

        .controls.compact .soft-icon-btn.label-btn {
            min-width: 46px;
            padding: 0 14px;
            font-size: 12px;
        }

        .ui-refined.mode-reading .controls {
            opacity: 0.16;
            transform: translateY(6px) scale(0.985);
        }

        .ui-refined.mode-reading .controls:hover {
            opacity: 1;
            transform: none;
        }

        .ui-refined.mode-reading .music-dock,
        .ui-refined.mode-reading .favorites-panel {
            opacity: 0.74;
        }

        .ui-refined.mode-reading .music-dock:hover,
        .ui-refined.mode-reading .favorites-panel:hover {
            opacity: 1;
        }

        .arrange-search-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 999px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .arrange-search-input {
            width: 170px;
            border: none;
            outline: none;
            background: transparent;
            color: var(--soft-text);
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 0.02em;
        }

        .arrange-search-meta {
            font-size: 11px;
            color: var(--muted-text);
            letter-spacing: 0.1em;
            white-space: nowrap;
        }

        .arrange-groups-wrap,
        .arrange-filter-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 999px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }

        .arrange-group-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .soft-icon-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            color: var(--soft-text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-size: 18px;
            padding: 0;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        .soft-icon-btn.label-btn {
            width: auto;
            min-width: 52px;
            padding: 0 16px;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: 0.08em;
        }

        .soft-icon-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.06);
            border-color: rgba(255, 255, 255, 0.24);
        }

        .soft-icon-btn:focus-visible,
        .add-btn:focus-visible,
        .panel-icon-btn:focus-visible,
        .music-mini-btn:focus-visible,
        .tiny-btn:focus-visible,
        .profile-toggle-btn:focus-visible,
        .style-btn:focus-visible,
        .modal-input:focus-visible,
        .modal-content textarea:focus-visible,
        .favorites-head-main:focus-visible {
            outline: 2px solid rgba(168, 149, 184, 0.72);
            outline-offset: 2px;
        }

        .add-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            color: var(--soft-text);
            font-size: 28px;
            font-weight: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 0;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        .add-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.1) rotate(90deg);
            border-color: rgba(255, 255, 255, 0.28);
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.08);
        }

        .music-dock {
            position: absolute;
            left: 40px;
            bottom: 32px;
            z-index: 100;
            min-width: 0;
            max-width: min(520px, 62vw);
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(22, 24, 34, 0.64);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
            transition: background 0.35s ease, box-shadow 0.35s ease, opacity 0.35s ease, transform 0.35s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .music-dock.collapsed {
            display: inline-flex;
            width: fit-content;
            min-width: 0;
            max-width: min(360px, 62vw);
            max-height: 72px;
            background: rgba(22, 24, 34, 0.46);
        }

        .music-dock.expanded {
            max-height: 520px;
        }

        .dock-body {
            overflow: hidden;
            transition: opacity 0.28s ease, transform 0.28s ease;
            transform-origin: top;
        }

        .music-dock.collapsed .dock-body {
            max-height: 0;
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
        }

        .music-dock.expanded .dock-body {
            max-height: 430px;
            opacity: 1;
            transform: translateY(0);
        }

        .music-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: nowrap;
        }

        .music-dock.collapsed .music-top {
            justify-content: flex-start;
        }

        .music-dock.collapsed .panel-head {
            flex: 0 1 auto;
        }

        .music-dock.collapsed .music-meta {
            flex: 0 1 auto;
            max-width: min(220px, 42vw);
        }

        .music-dock.collapsed .music-actions {
            display: none;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-width: 0;
        }

        .panel-head-main {
            min-width: 0;
            flex: 1;
            cursor: pointer;
        }

        .panel-head-tools {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .music-meta {
            min-width: 0;
            flex: 1;
        }

        .music-label {
            font-size: 11px;
            letter-spacing: 0.18em;
            color: var(--muted-text);
            margin-bottom: 6px;
        }

        .music-name {
            font-size: 14px;
            color: var(--soft-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .panel-icon-btn {
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted-text);
            border-radius: 999px;
            min-width: 34px;
            height: 34px;
            padding: 0 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.25s ease;
        }

        .panel-icon-btn:hover,
        .panel-icon-btn.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--soft-text);
        }

        .pin-svg {
            width: 14px;
            height: 14px;
            display: block;
            pointer-events: none;
        }

        .profile-toggle-btn {
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(244, 240, 235, 0.86);
            border-radius: 999px;
            height: 34px;
            padding: 0 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 0.08em;
            transition: all 0.25s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .profile-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(255, 255, 255, 0.22);
        }

        .press-jelly,
        .press-soft {
            transition: transform 0.20s ease, opacity 0.20s ease, background 0.20s ease, box-shadow 0.20s ease, border-color 0.20s ease;
        }

        .press-jelly:active {
            transform: translateY(1px) scale(0.98);
            opacity: 0.92;
        }

        .press-soft:active {
            transform: translateY(1px);
            opacity: 0.94;
        }

        @media (prefers-reduced-motion: reduce) {
            .press-jelly,
            .press-soft {
                transition: none;
            }
        }

        .profile-toggle-btn,
        .music-btn,
        .add-btn,
        .reunion-btn,
        .soft-icon-btn {
            transition: transform 0.20s ease, opacity 0.20s ease, background 0.20s ease, box-shadow 0.20s ease, border-color 0.20s ease;
        }

        .profile-toggle-btn:active,
        .music-btn:active,
        .add-btn:active,
        .reunion-btn:active,
        .soft-icon-btn:active {
            transform: translateY(1px) scale(0.98);
            opacity: 0.92;
        }

        .panel-icon-btn,
        .music-mini-btn {
            transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .panel-icon-btn:active,
        .music-mini-btn:active {
            transform: translateY(1px);
            opacity: 0.94;
        }

        @media (prefers-reduced-motion: reduce) {
            .profile-toggle-btn,
            .music-btn,
            .add-btn,
            .reunion-btn,
            .soft-icon-btn,
            .panel-icon-btn,
