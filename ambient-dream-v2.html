<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式梦境 - 意识流</title>
    <!-- 引入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 GSAP 和 Draggable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>

    <style>
        :root {
            --bg-color: #101118;
            --accent-1: #7f809a;
            --accent-2: #a895b8;
            --accent-3: #98aebb;
            --accent-4: #8fa58f;
            --panel-bg: rgba(255, 255, 255, 0.06);
            --panel-border: rgba(255, 255, 255, 0.14);
            --soft-text: rgba(244, 240, 235, 0.92);
            --muted-text: rgba(244, 240, 235, 0.52);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: "Noto Serif SC", "Songti SC", "Georgia", serif;
            color: var(--soft-text);
            user-select: none;
            -webkit-user-select: none;
        }

        * {
            box-sizing: border-box;
        }

        #root {
            width: 100%;
            height: 100%;
        }

        /* 复杂的流动背景层 */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            filter: blur(80px);
            opacity: 0.42;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            will-change: transform;
        }

        /* 顶部遮罩，用来加一些噪点质感 */
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            mix-blend-mode: overlay;
        }

        /* 主视图容器 */
        .main-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
        }

        /* 活跃文字区 */
        .active-text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 900px;
            text-align: center;
            pointer-events: none;
            z-index: 50;
            perspective: 1000px;
        }

        .active-text {
            font-size: 2.5rem;
            line-height: 1.8;
            text-shadow: 0 0 18px rgba(255, 245, 235, 0.18), 0 0 36px rgba(152, 174, 187, 0.14);
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0;
            will-change: transform, opacity;
        }

        /* 掉落的便签容器 */
        .notes-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 20;
        }

        /* 便签基础样式 */
        .memory-note {
            position: absolute;
            padding: 24px 32px;
            border-radius: 16px;
            max-width: 320px;
            font-size: 1.1rem;
            line-height: 1.6;
            cursor: grab;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            word-wrap: break-word;
            will-change: transform, opacity, box-shadow;
            transform-origin: center center;
            /* 初始状态由GSAP控制 */
        }

        .memory-note.focused {
            box-shadow: 0 18px 60px rgba(255, 245, 235, 0.16);
        }
        
        .memory-note:active {
            cursor: grabbing;
        }

        /* 便签主题：深海、幻光、极简线框、霓虹、纸本等 */
        .theme-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(248, 243, 239, 0.88);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .theme-abyss {
            background: rgba(24, 29, 42, 0.62);
            border: 1px solid rgba(152, 174, 187, 0.18);
            color: #d9e5eb;
            box-shadow: 0 10px 40px rgba(90, 110, 120, 0.08);
        }

        .theme-crimson {
            background: rgba(68, 46, 57, 0.52);
            border: 1px solid rgba(220, 192, 198, 0.18);
            color: #f3e7e9;
            box-shadow: 0 10px 40px rgba(96, 62, 74, 0.08);
        }

        .theme-holo {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(168, 149, 184, 0.12), rgba(152, 174, 187, 0.08));
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #f7f3ef;
            box-shadow: 0 10px 40px rgba(120, 110, 140, 0.12);
        }

        .theme-paper {
            background: rgba(236, 231, 222, 0.9);
            border: 1px solid rgba(195, 184, 166, 0.36);
            color: #35312d;
            text-shadow: none;
            box-shadow: 2px 8px 20px rgba(0, 0, 0, 0.4);
            font-family: "Georgia", serif;
        }

        .theme-neon {
            background: rgba(28, 35, 31, 0.62);
            border: 1px solid rgba(172, 193, 170, 0.22);
            color: #e0ebe0;
            box-shadow: 0 0 15px rgba(143, 165, 143, 0.18), inset 0 0 10px rgba(143, 165, 143, 0.08);
            text-shadow: 0 0 5px rgba(224, 235, 224, 0.18);
            font-family: "Courier New", monospace;
        }

        .theme-blush {
            background: rgba(133, 94, 112, 0.38);
            border: 1px solid rgba(244, 215, 226, 0.22);
            color: #fff4f8;
            box-shadow: 0 12px 30px rgba(97, 65, 83, 0.18);
        }

        .theme-lavender {
            background: rgba(118, 111, 153, 0.34);
            border: 1px solid rgba(224, 218, 247, 0.22);
            color: #f6f2ff;
            box-shadow: 0 12px 30px rgba(90, 84, 124, 0.16);
        }

        .theme-pearl {
            background: rgba(241, 233, 228, 0.86);
            border: 1px solid rgba(214, 200, 193, 0.4);
            color: #403734;
            box-shadow: 0 14px 34px rgba(46, 39, 38, 0.16);
        }

        .theme-sunset {
            background: rgba(171, 125, 112, 0.36);
            border: 1px solid rgba(248, 219, 204, 0.22);
            color: #fff6f0;
            box-shadow: 0 12px 32px rgba(114, 82, 74, 0.18);
        }

        .font-serif {
            font-family: "Noto Serif SC", "Songti SC", "Georgia", serif;
        }

        .font-kaiti {
            font-family: "Kaiti SC", "STKaiti", "KaiTi", serif;
        }

        .font-fangsong {
            font-family: "FangSong", "STFangsong", serif;
        }

        .font-sans {
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
        }

        .font-rounded {
            font-family: "YouYuan", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        /* 控制面板/操作按钮 */
        .controls {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .controls.compact {
            gap: 10px;
        }

        .soft-icon-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            color: var(--soft-text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .soft-icon-btn.label-btn {
            width: auto;
            min-width: 52px;
            padding: 0 16px;
            border-radius: 999px;
            font-size: 13px;
            letter-spacing: 0.08em;
        }

        .soft-icon-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.06);
            border-color: rgba(255, 255, 255, 0.24);
        }

        .add-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            color: var(--soft-text);
            font-size: 28px;
            font-weight: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .add-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.1) rotate(90deg);
            border-color: rgba(255, 255, 255, 0.28);
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.08);
        }

        .music-dock {
            position: absolute;
            left: 40px;
            bottom: 32px;
            z-index: 100;
            min-width: 320px;
            max-width: min(520px, 62vw);
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(22, 24, 34, 0.64);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
            transition: max-height 0.35s ease, width 0.35s ease, background 0.35s ease, box-shadow 0.35s ease;
            overflow: hidden;
        }

        .music-dock.collapsed {
            width: min(420px, 44vw);
            min-width: 340px;
            max-width: min(420px, 44vw);
            max-height: 72px;
            background: rgba(22, 24, 34, 0.46);
        }

        .music-dock.expanded {
            max-height: 520px;
        }

        .dock-body {
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.28s ease, transform 0.28s ease;
            transform-origin: top;
        }

        .music-dock.collapsed .dock-body {
            max-height: 0;
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
        }

        .music-dock.expanded .dock-body {
            max-height: 430px;
            opacity: 1;
            transform: translateY(0);
        }

        .music-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: nowrap;
        }

        .music-dock.collapsed .music-actions {
            display: none;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-width: 0;
        }

        .panel-head-main {
            min-width: 0;
            flex: 1;
            cursor: pointer;
        }

        .panel-head-tools {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .music-meta {
            min-width: 0;
            flex: 1;
        }

        .music-label {
            font-size: 11px;
            letter-spacing: 0.18em;
            color: var(--muted-text);
            margin-bottom: 6px;
        }

        .music-name {
            font-size: 14px;
            color: var(--soft-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .panel-icon-btn {
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted-text);
            border-radius: 999px;
            min-width: 34px;
            height: 34px;
            padding: 0 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.25s ease;
        }

        .panel-icon-btn:hover,
        .panel-icon-btn.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--soft-text);
        }

        .music-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .music-btn {
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.06);
            color: var(--soft-text);
            border-radius: 999px;
            padding: 9px 14px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.25s ease;
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.24);
        }

        .music-foot {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: nowrap;
        }

        .music-count,
        .music-tip {
            font-size: 12px;
            color: var(--muted-text);
        }

        .music-time {
            font-size: 12px;
            color: rgba(244, 240, 235, 0.72);
            min-width: 88px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .music-progress {
            flex: 1;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            touch-action: none;
        }

        .music-progress > span {
            display: block;
            height: 100%;
            width: var(--progress, 0%);
            background: linear-gradient(90deg, rgba(235, 230, 224, 0.58), rgba(152, 174, 187, 0.58));
        }

        .music-progress::after {
            content: '';
            position: absolute;
            top: 50%;
            left: calc(var(--progress, 0%) - 5px);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(250, 244, 238, 0.92);
            transform: translateY(-50%);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.06);
        }

        .music-toolbar {
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .music-toolbar-left,
        .music-toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-label {
            color: var(--muted-text);
            font-size: 11px;
            letter-spacing: 0.08em;
        }

        .volume-slider {
            width: 78px;
            accent-color: rgba(235, 230, 224, 0.75);
            opacity: 0.8;
            cursor: pointer;
        }

        .music-mini-btn {
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: var(--soft-text);
            border-radius: 999px;
            padding: 7px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.25s ease;
        }

        .music-mini-btn:hover,
        .music-mini-btn.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.22);
        }

        .playlist-panel {
            margin-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 12px;
            max-height: 190px;
            overflow: auto;
        }

        .playlist-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
        }

        .playlist-main {
            min-width: 0;
            cursor: pointer;
        }

        .playlist-main strong {
            display: block;
            color: var(--soft-text);
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-main span {
            display: block;
            margin-top: 3px;
            font-size: 11px;
            color: var(--muted-text);
        }

        .playlist-row.active .playlist-main strong {
            color: #fff;
        }

        .playlist-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tiny-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: var(--soft-text);
            cursor: pointer;
            font-size: 11px;
        }

        .chapter-badge {
            position: absolute;
            left: 38px;
            top: 32px;
            z-index: 110;
            padding: 12px 16px;
            border-radius: 18px;
            background: rgba(22, 24, 34, 0.54);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .chapter-badge .stage-name {
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--muted-text);
            margin-bottom: 6px;
        }

        .chapter-badge .stage-copy {
            font-size: 14px;
            color: var(--soft-text);
        }

        .chapter-subline {
            margin-top: 8px;
            font-size: 11px;
            color: var(--muted-text);
            letter-spacing: 0.1em;
        }

        .favorites-panel {
            position: absolute;
            right: 40px;
            top: 32px;
            z-index: 110;
            width: min(360px, 34vw);
            max-height: 38vh;
            overflow: auto;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(22, 24, 34, 0.54);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: max-height 0.35s ease, width 0.35s ease, background 0.35s ease;
            overflow: hidden;
        }

        .favorites-panel.collapsed {
            width: 200px;
            max-height: 62px;
            background: rgba(22, 24, 34, 0.44);
        }

        .favorites-panel.expanded {
            max-height: 38vh;
        }

        .favorites-body {
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.28s ease, transform 0.28s ease;
        }

        .favorites-panel.collapsed .favorites-body {
            max-height: 0;
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
        }

        .favorites-panel.expanded .favorites-body {
            max-height: 28vh;
            opacity: 1;
            transform: translateY(0);
        }

        .favorites-title {
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--muted-text);
            margin-bottom: 0;
        }

        .favorites-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .favorites-head-main {
            cursor: pointer;
            flex: 1;
            min-width: 0;
        }

        .favorites-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 10px;
        }

        .favorite-item {
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
            color: var(--soft-text);
            font-size: 13px;
            line-height: 1.65;
            cursor: pointer;
        }

        .favorite-empty {
            color: var(--muted-text);
            font-size: 12px;
            line-height: 1.7;
        }

        .love-side-note {
            position: absolute;
            left: 50%;
            bottom: 72px;
            transform: translateX(-50%);
            z-index: 70;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--muted-text);
            font-size: 11px;
            letter-spacing: 0.12em;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: opacity 0.4s ease;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: rgba(27, 29, 38, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: min(82vh, 760px);
            overflow: auto;
            transform: translateY(30px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay.open .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-content h3 {
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--soft-text);
        }

        .modal-content textarea {
            width: 100%;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 16px;
            color: var(--soft-text);
            font-family: inherit;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .modal-content textarea:focus {
            border-color: rgba(255, 255, 255, 0.28);
        }

        .modal-subtitle {
            margin: -8px 0 18px;
            color: var(--muted-text);
            font-size: 13px;
            line-height: 1.7;
        }

        .picker-group {
            margin-bottom: 18px;
        }

        .picker-label {
            margin-bottom: 10px;

            .controls {

            .soft-icon-btn,
            .add-btn {

            .soft-icon-btn.label-btn {

            .hint {

            .love-side-note {
                left: 16px;

                bottom: 168px;
                transform: none;
                text-align: center;

            .modal-content {

                padding: 22px 18px;

            }

            .modal-content h3 {

            .modal-content textarea {

            .directory-toolbar-actions,
            .quote-row-actions {

                text-align: left;

            .main-stage.viewport-mobile-portrait .music-dock {

                border-radius: 22px 22px 16px 16px;
            }

            .main-stage.viewport-mobile-portrait .favorites-panel {
                top: 94px;
            }

            .modal-actions {

            }

            .action-btn {
                flex: 1;
